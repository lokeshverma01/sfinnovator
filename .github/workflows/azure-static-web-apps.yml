# CI/CD: build the Astro site and deploy to Azure Static Web Apps on push.
#
# NOTE: When you connect this repo in the Azure Portal, Azure can generate a
# very similar workflow automatically and add the API token secret for you.
# This file is a ready-made template — keep it, or let Azure replace it.
#
# Required secret (added automatically by Azure, or add it manually in
# GitHub -> Settings -> Secrets -> Actions):
#   AZURE_STATIC_WEB_APPS_API_TOKEN
name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: '/'
          output_location: 'dist'
