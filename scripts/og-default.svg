<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Source for the default OG share image. Edit this, then run:
       node scripts/build-og.mjs   (regenerates public/images/og-default.png) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0d"/>
      <stop offset="1" stop-color="#0f1620"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="30%" r="55%">
      <stop offset="0" stop-color="#0176D3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0176D3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 80H1200 M0 160H1200 M0 240H1200 M0 320H1200 M0 400H1200 M0 480H1200 M0 560H1200"/>
    <path d="M80 0V630 M200 0V630 M320 0V630 M440 0V630 M560 0V630 M680 0V630 M800 0V630 M920 0V630 M1040 0V630 M1160 0V630"/>
  </g>

  <!-- logo badge -->
  <rect x="90" y="90" width="84" height="84" rx="20" fill="#0176D3"/>
  <text x="132" y="148" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800"
        fill="#ffffff" text-anchor="middle">SF</text>

  <text x="196" y="148" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700"
        fill="#ecedef">SF Innovator</text>

  <!-- headline -->
  <text x="90" y="330" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800"
        fill="#ffffff" letter-spacing="-2">Salesforce,</text>
  <text x="90" y="430" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800"
        fill="#2a9bf4" letter-spacing="-2">explained well.</text>

  <!-- subtext -->
  <text x="92" y="510" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="400"
        fill="#9aa1ad">Implementations · Use cases · Debugging · Portfolio</text>
</svg>
